services:
  # --- Infrastructure ---
  kafka:
    image: apache/kafka:latest
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: "6"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      CLUSTER_ID: "spirii-ocpp-local-01"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: spirii
      POSTGRES_PASSWORD: spirii
      POSTGRES_DB: spirii
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spirii"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka-init:
    image: apache/kafka:latest
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        for TOPIC in ocpp.boot_notification ocpp.status_notification ocpp.meter_values ocpp.transactions ocpp.heartbeat; do
          /opt/kafka/bin/kafka-topics.sh --create --bootstrap-server kafka:9092 --topic $$TOPIC --partitions 6 --replication-factor 1 --if-not-exists
        done
        echo "Topics created."

  # --- Application Services ---
  wsgw:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CMD: wsgw
    environment:
      KAFKA_BROKERS: kafka:9092
      LISTEN_ADDR: ":8080"
    ports:
      - "8080:8080"
    depends_on:
      kafka-init:
        condition: service_completed_successfully

  state-processor:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CMD: state-processor
    environment:
      KAFKA_BROKERS: kafka:9092
      POSTGRES_DSN: "postgres://spirii:spirii@postgres:5432/spirii?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      METRICS_ADDR: ":8082"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CMD: api
    environment:
      REDIS_ADDR: "redis:6379"
      LISTEN_ADDR: ":8081"
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy

  cp-simulator:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CMD: cp-simulator
    environment:
      WSGW_URL: "ws://wsgw:8080"
      NUM_CHARGERS: "50"
      CONNECTORS_PER_CHARGER: "2"
      METER_INTERVAL_SEC: "10"
      HEARTBEAT_INTERVAL_SEC: "30"
    depends_on:
      - wsgw

  # --- Observability ---
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - wsgw
      - api

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: spirii
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
