global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "wsgw"
    static_configs:
      - targets: ["wsgw:8080"]
    metrics_path: /metrics

  - job_name: "state-processor"
    static_configs:
      - targets: ["state-processor:8082"]
    metrics_path: /metrics

  - job_name: "api"
    static_configs:
      - targets: ["api:8081"]
    metrics_path: /metrics
